name: sync-rootme-stats

on:
  schedule:
    # Runs once a day at 06:00 UTC — adjust as you like
    - cron: "0 12 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Fetch Root-Me stats and patch README
        env:
          ROOTME_API_KEY: ${{ secrets.ROOTME_API_KEY }}
          ROOTME_ID: ${{ secrets.ROOTME_ID }}
        run: python scripts/update_rootme.py

      - name: Commit changes if any
        run: |
          git config user.name "rootme-bot"
          git config user.email "actions@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: sync root-me stats"
          git push
